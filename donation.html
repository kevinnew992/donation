<!-- ONLY showing the modified donation section + script -->
<!-- KEEP rest of your HTML SAME -->

<!-- Amount override -->
<div class="row g-3 mt-2">
  <div class="col-md-12">
    <label class="form-label fw-semibold">Donation Amount (USD)</label>
    <input type="number" name="amount" id="donationAmountInput" class="form-control" min="1" required>
    
    <!-- ✅ LKR Display -->
    <small id="lkrDisplay" class="text-muted d-block mt-2">
      LKR equivalent: Rs 0.00
    </small>

    <small class="text-muted d-block">
      *Approximate value based on current exchange rate
    </small>
  </div>

  <div class="col-12">
    <p class="fs-xs text-muted mb-0">
      You can adjust this amount freely. International cards are welcome – your bank or card provider will
      convert from your card currency to <strong>USD</strong>.
    </p>
  </div>
</div>

<!-- Button -->
<div class="mt-4 d-grid d-sm-flex align-items-center justify-content-between">
  <button type="submit" class="vs-btn">
    Click to donate
  </button>
  <p class="fs-xs mb-0 text-muted mt-3 mt-sm-0">
    You will be redirected to secure payment page to enter your card details.
  </p>
</div>

<!-- ✅ SCRIPT (add before </body>) -->
<script>
  (function () {
    const usdInput = document.getElementById("donationAmountInput");
    const lkrDisplay = document.getElementById("lkrDisplay");

    let exchangeRate = 300; // fallback

    // 🔥 Get live rate
    fetch("https://api.exchangerate-api.com/v4/latest/USD")
      .then(res => res.json())
      .then(data => {
        if (data && data.rates && data.rates.LKR) {
          exchangeRate = data.rates.LKR;
        }
      })
      .catch(() => {
        console.log("Using fallback rate (300)");
      });

    function updateLKR() {
      const usd = parseFloat(usdInput.value);

      if (!isNaN(usd) && usd > 0) {
        const lkr = usd * exchangeRate;

        lkrDisplay.innerHTML =
          "<strong>LKR equivalent:</strong> Rs " +
          lkr.toLocaleString(undefined, {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
          });
      } else {
        lkrDisplay.innerText = "LKR equivalent: Rs 0.00";
      }
    }

    usdInput.addEventListener("input", updateLKR);
  })();
</script>
