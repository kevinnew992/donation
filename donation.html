<input type="text" placeholder="Full Name" class="form-control mb-2" required>
<input type="email" placeholder="Email" class="form-control mb-2" required>
<input type="tel" placeholder="Phone" class="form-control mb-2">

<!-- ✅ FIXED: DROPDOWN ADDED PROPERLY -->
<select id="donationAmountInput" class="form-control mb-2" required>
  <option value="">Select Amount</option>
  <option value="50">50</option>
  <option value="100">100</option>
  <option value="500">500</option>
  <option value="1000">1000</option>
  <option value="2000">2000</option>
  <option value="5000">5000</option>
  <option value="10000">10000</option>
  <option value="20000">20000</option>
  <option value="30000">30000</option>
  <option value="40000">40000</option>
  <option value="50000">50000</option>
</select>

<select id="currencySelect" class="form-control mb-2">
  <option value="USD">USD</option>
  <option value="GBP">GBP</option>
  <option value="EUR">EUR</option>
  <option value="CNY">CNY</option>
</select>

<p id="lkrDisplay"></p>

<a href="#" id="donateBtn" class="vs-btn">Click to donate</a>

<script>
window.addEventListener('load', function () {
  document.querySelector('.preloader').style.display = 'none';
});

const conversionRates = {
  USD: 315,
  GBP: 425,
  EUR: 340,
  CNY: 45
};

const amountInput = document.getElementById("donationAmountInput");
const currencySelect = document.getElementById("currencySelect");
const lkrDisplay = document.getElementById("lkrDisplay");

function updateLKR() {
  const amount = parseFloat(amountInput.value);
  const currency = currencySelect.value;

  if (!isNaN(amount)) {
    const lkr = amount * conversionRates[currency];
    lkrDisplay.textContent = "≈ LKR " + lkr.toLocaleString();
  } else {
    lkrDisplay.textContent = "";
  }
}

amountInput.addEventListener("change", updateLKR);
currencySelect.addEventListener("change", updateLKR);

// ✅ FIXED DONATION LOGIC
document.getElementById("donateBtn").addEventListener("click", function (e) {
  e.preventDefault();

  const amount = parseInt(document.getElementById("donationAmountInput").value);

  if (!amount) {
    alert("Select an amount");
    return;
  }

  let link = "";

  switch (amount) {
    case 50:
      link = "https://paylink.geniebiz.lk/LINK_50";
      break;
    case 100:
      link = "https://paylink.geniebiz.lk/LINK_100";
      break;
    case 500:
      link = "https://paylink.geniebiz.lk/LINK_500";
      break;
    case 1000:
      link = "https://paylink.geniebiz.lk/nAz10qb5YK";
      break;
    case 2000:
      link = "https://paylink.geniebiz.lk/LINK_2000";
      break;
    case 5000:
      link = "https://paylink.geniebiz.lk/woZQZqDl7A";
      break;
    case 10000:
      link = "https://paylink.geniebiz.lk/n48W3JABXk";
      break;
    case 20000:
      link = "https://paylink.geniebiz.lk/LINK_20000";
      break;
    case 30000:
      link = "https://paylink.geniebiz.lk/LINK_30000";
      break;
    case 40000:
      link = "https://paylink.geniebiz.lk/LINK_40000";
      break;
    case 50000:
      link = "https://paylink.geniebiz.lk/LINK_50000";
      break;
    default:
      alert("Invalid selection");
      return;
  }

  window.location.href = link;
});
</script>
