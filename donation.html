<!doctype html>
<html class="no-js" lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <title>Rambuke roots (Pvt) Ltd. - Donate</title>
  <meta name="author" content="Rambuke roots">
  <meta name="description"
    content="Support Rambuke roots to plant 1 billion native and endangered plants in Sri Lanka by 2050.">
  <meta name="keywords" content="Rambuke roots, donation, Sampath Bank, Sri Lanka, reforestation, endangered plants">
  <meta name="robots" content="INDEX,FOLLOW">
  <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">

  <!-- CSS (UNCHANGED) -->
  <link rel="stylesheet" href="assets/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="assets/css/app.min.css">
  <link rel="stylesheet" href="assets/css/fontawesome.min.css">
  <link rel="stylesheet" href="assets/css/animate.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <!-- PRELOADER (UNCHANGED) -->
  <div class="preloader">
    <button class="vs-btn preloaderCls">Cancel Preloader</button>
  </div>

  <!-- ========================= -->
  <!-- DONATION SECTION -->
  <!-- ========================= -->

  <section class="vs-about-wrapper space-md-bottom">
    <div class="container">
      <div class="row gx-60">

        <!-- LEFT -->
        <div class="col-lg-6">
          <h2>Support the 1B Plants by 2050 Fund</h2>
          <p>You can donate any amount.</p>
        </div>

        <!-- RIGHT -->
        <div class="col-lg-6">
          <div class="inner-wrap1 px-40 py-40">

            <h3>Donation Details</h3>

            <form id="sampathDonationForm">

              <!-- Donor -->
              <input type="text" placeholder="Full Name" class="form-control mb-2" required>
              <input type="email" placeholder="Email" class="form-control mb-2" required>
              <input type="tel" placeholder="Phone" class="form-control mb-2">

              <!-- Amount -->
              <input type="number" id="donationAmountInput" class="form-control mb-2" placeholder="Amount" required>

              <!-- Currency -->
              <select id="currencySelect" class="form-control mb-2">
                <option value="USD">USD</option>
                <option value="GBP">GBP</option>
                <option value="EUR">EUR</option>
                <option value="CNY">CNY</option>
              </select>

              <!-- LKR DISPLAY -->
              <p id="lkrDisplay"></p>

              <!-- ✅ UPDATED BUTTON -->
              <a href="#" id="donateBtn" class="vs-btn">Click to donate</a>

            </form>

          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- ========================= -->
  <!-- JS -->
  <!-- ========================= -->

  <script>
    // PRELOADER FIX
    window.addEventListener('load', function () {
      document.querySelector('.preloader').style.display = 'none';
    });

    // CURRENCY CONVERSION (UNCHANGED LOGIC)
    const conversionRates = {
      USD: 315,
      GBP: 425,
      EUR: 340,
      CNY: 45
    };

    const amountInput = document.getElementById("donationAmountInput");
    const currencySelect = document.getElementById("currencySelect");
    const lkrDisplay = document.getElementById("lkrDisplay");

    function updateLKR() {
      const amount = parseFloat(amountInput.value);
      const currency = currencySelect.value;

      if (!isNaN(amount)) {
        const lkr = amount * conversionRates[currency];
        lkrDisplay.textContent = "≈ LKR " + lkr.toLocaleString();
      } else {
        lkrDisplay.textContent = "";
      }
    }

    amountInput.addEventListener("input", updateLKR);
    currencySelect.addEventListener("change", updateLKR);

    // =========================
    // ✅ YOUR REQUESTED LOGIC
    // =========================
    document.getElementById("donateBtn").addEventListener("click", function (e) {
      e.preventDefault();

      const amount = parseFloat(document.getElementById("donationAmountInput").value);

      if (isNaN(amount) || amount <= 0) {
        alert("Enter valid amount");
        return;
      }

      let link = "";

      if (amount === 6000) {
        link = "https://paylink.geniebiz.lk/woZQZqDl7A";
      } else if (amount === 10000) {
        link = "https://paylink.geniebiz.lk/n48W3JABXk";
      } else if (amount === 15000) {
        link = "https://paylink.geniebiz.lk/5D98xPOEem";
      } else {
        link = "https://paylink.geniebiz.lk/rb26la9M16";
      }

      window.location.href = link;
    });

  </script>

</body>
</html>
