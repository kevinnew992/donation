<body>

  <!-- TOP BAR -->
  <div class="header-top-wrapper bg-black pb-2 pt-10 d-none d-lg-block">
    <div class="container">
      <div class="row">
        <div class="col">Call: +94 77 338 6699</div>
        <div class="col text-center">No. 20, Frances Road, Colombo 6</div>
        <div class="col text-end">dillont0777@gmail.com</div>
      </div>

  </div>

  <!-- NAV -->
  <div class="sticky-header-wrap py-2">
    <div class="container d-flex justify-content-between">
      <img src="assets/img/logo.png" style="max-width: 40%;" />
      <nav>
        <a href="index-2.html">Home</a>

        <a href="products.html">Products</a>
        <a href="contact.html">Contact</a>

      </nav>
    </div>
  </div>

  <!-- HERO -->
  <div class="breadcumb-wrapper" style="background-image:url('assets/img/d1.png'); padding:200px 0;">
    <div class="text-center text-white">
      <h1>Plant 1 Billion Roots by 2050</h1>
    </div>
  </div>

  <!-- DONATION SECTION -->
  <section class="container py-5">
    <div class="row">

      <div class="col-md-6">
        <h2>Support the Mission</h2>
        <p>USD 2 = 1 sapling planted and maintained.</p>
      </div>

      <div class="col-md-6">

        <form>

          <input type="text" placeholder="Full Name" class="form-control mb-2">
          <input type="email" placeholder="Email" class="form-control mb-2">
          <input type="tel" placeholder="Phone" class="form-control mb-2">

          <input type="number" id="donationAmountInput" class="form-control mb-2" placeholder="Amount">

          <select id="currencySelect" class="form-control mb-2">
            <option value="USD">USD</option>
            <option value="GBP">GBP</option>
            <option value="EUR">EUR</option>
            <option value="CNY">CNY</option>
          </select>

          <p id="lkrDisplay"></p>

          <a href="#" id="donateBtn" class="btn btn-success w-100">Donate Now</a>

        </form>

      </div>
    </div>
  </section>

  <!-- JS -->
  <script>
    window.addEventListener('load', function () {
      document.querySelector('.preloader').style.display = 'none';
    });

    const conversionRates = {
      USD: 315,
      GBP: 425,
      EUR: 340,
      CNY: 45
    };

    const amountInput = document.getElementById("donationAmountInput");
    const currencySelect = document.getElementById("currencySelect");
    const lkrDisplay = document.getElementById("lkrDisplay");

    function updateLKR() {
      const amount = parseFloat(amountInput.value);
      const currency = currencySelect.value;

      if (!isNaN(amount)) {
        const lkr = amount * conversionRates[currency];
        lkrDisplay.textContent = "≈ LKR " + lkr.toLocaleString();
      } else {
        lkrDisplay.textContent = "";
      }
    }

    amountInput.addEventListener("input", updateLKR);
    currencySelect.addEventListener("change", updateLKR);

    // DONATION LOGIC (FIXED)
    document.getElementById("donateBtn").addEventListener("click", function (e) {
      e.preventDefault();

      const amount = parseFloat(document.getElementById("donationAmountInput").value);

      if (isNaN(amount)) {
        alert("Select an amount");
        return;
      }

      let link = "";

      switch (amount) {
        case 50:
          link = "https://paylink.geniebiz.lk/LINK_50";
          break;
        case 100:
          link = "https://paylink.geniebiz.lk/LINK_100";
          break;
        case 500:
          link = "https://paylink.geniebiz.lk/LINK_500";
          break;
        case 1000:
          link = "https://paylink.geniebiz.lk/nAz10qb5YK";
          break;
        case 2000:
          link = "https://paylink.geniebiz.lk/LINK_2000";
          break;
        case 5000:
          link = "https://paylink.geniebiz.lk/woZQZqDl7A";
          break;
        case 10000:
          link = "https://paylink.geniebiz.lk/n48W3JABXk";
          break;
        case 20000:
          link = "https://paylink.geniebiz.lk/LINK_20000";
          break;
        case 30000:
          link = "https://paylink.geniebiz.lk/LINK_30000";
          break;
        case 40000:
          link = "https://paylink.geniebiz.lk/LINK_40000";
          break;
        case 50000:
          link = "https://paylink.geniebiz.lk/LINK_50000";
          break;
        default:
          alert("Invalid selection");
          return;
      }

      window.location.href = link;
    });

  </script>
